<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>愛心氣球祝福站</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #ff758c; --bg: #0b0b26; }
        body {
            background-color: var(--bg);
            background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #0b0b26 100%);
            font-family: 'Quicksand', 'Noto Sans TC', sans-serif;
            color: white;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        
        #canvas-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            background: rgba(0,0,0,0.3);
            border-radius: 24px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
            touch-action: none;
            overflow: hidden;
        }
        canvas { width: 100%; height: 100%; touch-action: none; }

        .btn-primary {
            background: linear-gradient(135deg, #ff758c 0%, #ff7e5f 100%);
            box-shadow: 0 8px 20px rgba(255, 117, 140, 0.3);
        }

        .selfie-camera-btn {
            position: relative;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .selfie-camera-btn:active { transform: scale(0.92); }
        .selfie-camera-btn.captured { border-color: #4ade80; }

        video, .captured-img { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); border-radius: 9999px; }

        .color-dot {
            width: 30px; height: 30px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            transition: all 0.2s;
        }
        .color-dot.active { transform: scale(1.2); border-color: white; box-shadow: 0 0 15px currentColor; }

        .size-btn {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.5);
            font-size: 10px; font-weight: 800;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; items-center justify-center;
        }
        .size-btn.active {
            background: var(--primary);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 15px var(--primary);
            transform: scale(1.1);
        }

        /* 消隱動畫容器 */
        #launch-anim {
            pointer-events: none;
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
        }
    </style>
</head>
<body class="p-4 safe-area-inset-bottom">
    
    <!-- 教學引導 (超簡約親師版) -->
    <div id="tutorial" class="fixed inset-0 z-[1000] bg-[#0b0b26]/98 backdrop-blur-2xl flex flex-col items-center justify-center p-8 text-center">
        <div class="space-y-8 max-w-sm">
            <div class="space-y-2">
                <div class="text-4xl">👨‍👩‍👧‍👦 + 🎈</div>
                <h2 class="text-3xl font-black text-pink-300 italic">給寶貝驚喜！</h2>
                <p class="text-sm text-white/70">只要 3 個動作，氣球就會飛上大螢幕喔</p>
            </div>
            
            <div class="space-y-4 text-left">
                <div class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/10">
                    <div class="w-10 h-10 bg-pink-500 rounded-full flex items-center justify-center font-black">1</div>
                    <p class="text-sm"><strong>跟孩子「拍張合照」</strong><br><span class="text-[10px] text-white/40">點上方圓圈圈就能拍囉！</span></p>
                </div>
                <div class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/10">
                    <div class="w-10 h-10 bg-pink-500 rounded-full flex items-center justify-center font-black">2</div>
                    <p class="text-sm"><strong>畫個「彩色愛心」</strong><br><span class="text-[10px] text-white/40">隨便畫都好，心意最重要！</span></p>
                </div>
                <div class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/10">
                    <div class="w-10 h-10 bg-pink-500 rounded-full flex items-center justify-center font-black">3</div>
                    <p class="text-sm"><strong>寫名字「發射」！</strong><br><span class="text-[10px] text-white/40">預備——起！氣球飛上去啦！</span></p>
                </div>
            </div>

            <div class="p-4 bg-amber-500/10 border border-amber-500/20 rounded-2xl">
                <p class="text-[10px] text-amber-200">💡 爸媽免擔心：只要有畫有拍，氣球就一定會飛上去。跟孩子一起按「發射」最有感喔！</p>
            </div>

            <button onclick="document.getElementById('tutorial').style.display='none'" class="w-full py-5 bg-gradient-to-r from-pink-500 to-amber-500 rounded-3xl font-black text-xl shadow-2xl transform active:scale-95 transition-all">
                好的！我們來試試看
            </button>
        </div>
    </div>

    <div class="max-w-md mx-auto space-y-6 flex flex-col min-h-[calc(100vh-32px)]">
        
        <!-- Header: Selfie Concentric Layout -->
        <header class="text-center pt-2 space-y-4">
            <div class="flex items-center justify-center gap-3">
                <div class="text-3xl">🎈</div>
                <h1 class="text-xl font-black text-pink-300 tracking-tighter uppercase italic">Balloon Blessings</h1>
            </div>

            <!-- Central Selfie Button -->
            <div id="selfie-zone" onclick="initCamera()" class="selfie-camera-btn mx-auto w-32 h-32 group">
                <div class="absolute inset-0 bg-pink-500/20 rounded-full blur-2xl group-hover:bg-pink-500/40 transition-colors"></div>
                <div class="relative w-full h-full rounded-full border-4 border-white/10 p-1 bg-white/5 overflow-hidden flex items-center justify-center shadow-2xl backdrop-blur-sm">
                    <video id="video" autoplay playsinline class="hidden"></video>
                    <img id="photo-v" class="hidden captured-img">
                    <div id="cam-p" class="flex flex-col items-center justify-center text-pink-300">
                        <span class="text-5xl mb-1 drop-shadow-[0_0_15px_rgba(255,117,140,0.5)]">📸</span>
                        <p class="text-[10px] font-black tracking-widest uppercase opacity-60">跟孩子合照</p>
                    </div>
                </div>
                <!-- Status Badge -->
                <div id="capture-status" class="absolute bottom-1 right-1 bg-pink-500 rounded-full p-2 border-4 border-[#0b0b26] shadow-lg transition-transform scale-0">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
                </div>
            </div>
            <p class="text-[10px] text-white/30 uppercase tracking-[0.2em]">Step 1: 拍下這珍貴的一刻</p>
        </header>

        <div class="space-y-4">
            <p class="text-[10px] text-white/30 uppercase tracking-[0.2em] text-center">Step 2: 畫上彩色愛心</p>
            <!-- Main Canvas -->
            <div id="canvas-wrapper" class="glass">
                <canvas id="drawingCanvas"></canvas>
            </div>
        </div>

        <!-- Toolkit -->
        <div class="flex justify-between items-center px-2">
            <div class="flex gap-4 items-center">
                <div onclick="setColor('#ff758c', this)" class="color-dot active" style="background:#ff758c; color:#ff758c"></div>
                <div onclick="setColor('#ffd700', this)" class="color-dot" style="background:#ffd700; color:#ffd700"></div>
                <div onclick="setColor('#00f2fe', this)" class="color-dot" style="background:#00f2fe; color:#00f2fe"></div>
            </div>
            <div class="flex gap-2">
                <button onclick="setBrushSize(6, this)" class="size-btn">S</button>
                <button onclick="setBrushSize(14, this)" class="size-btn active">M</button>
                <button onclick="setBrushSize(26, this)" class="size-btn">L</button>
            </div>
            <button onclick="clearCanvas()" class="text-[10px] font-bold text-white/30 uppercase">清除</button>
        </div>

        <div class="mt-auto space-y-3 pb-4">
            <input type="text" id="parentName" maxlength="30" placeholder="輸入寶貝的名字 / 祝福語 (30字內)..." 
                class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 text-center font-bold text-lg focus:outline-none focus:ring-2 focus:ring-pink-500/50">
            <button id="launchBtn" onclick="launch()" class="w-full py-5 btn-primary rounded-[30px] font-black text-xl active:scale-95 transition-transform">
                🚀 發射祝福氣球
            </button>
        </div>
    </div>

    <!-- 即時發射動畫 -->
    <div id="launch-anim" class="fixed inset-0 z-50 flex items-center justify-center hidden opacity-0">
        <div class="relative">
            <img id="fb-draw" class="w-48 h-48 object-contain">
            <div class="absolute inset-0 flex items-center justify-center">
                <h2 class="text-3xl font-black italic text-pink-300 drop-shadow-2xl">升空啦！</h2>
            </div>
        </div>
    </div>

    <!-- 紀念卡彈窗 -->
    <div id="card-modal" class="fixed inset-0 z-[2000] bg-black/95 flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-sm space-y-6">
            <div class="glass p-8 rounded-[40px] text-center space-y-6 bg-[#1a1a3a]">
                <h3 class="text-xl font-bold text-pink-300">愛的紀念卡</h3>
                <div class="rounded-3xl overflow-hidden border-4 border-white/10 shadow-2xl">
                    <img id="cardDisplay" class="w-full">
                </div>
                <p class="text-[10px] text-white/40 italic">長按圖片可儲存留念 ❤️</p>
                <button onclick="location.reload()" class="w-full py-4 text-sm font-black bg-white/5 border border-white/10 rounded-2xl">再發一個！</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false, currentColor = '#ff758c', brushSize = 16, selfieData = null, stream = null;

        function initCanvas() {
            const wrap = document.getElementById('canvas-wrapper');
            const rect = wrap.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            drawHeart();
        }

        function drawHeart() {
            const w = canvas.width / window.devicePixelRatio, h = canvas.height / window.devicePixelRatio;
            ctx.clearRect(0,0,w,h);
            ctx.strokeStyle = 'rgba(255,255,255,0.08)';
            ctx.setLineDash([10,10]);
            ctx.beginPath(); ctx.arc(w/2, h/2, w*0.4, 0, Math.PI*2); ctx.stroke();
            ctx.setLineDash([]);
        }

        function setColor(c, el) {
            currentColor = c;
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            
            // Sync brush color to active size button glow
            const activeSize = document.querySelector('.size-btn.active');
            if(activeSize) activeSize.style.boxShadow = `0 0 15px ${c}`;
        }
        function setBrushSize(s, el) { 
            brushSize = s; 
            document.querySelectorAll('.size-btn').forEach(b => {
                b.classList.remove('active');
                b.style.boxShadow = '';
            });
            el.classList.add('active');
            el.style.boxShadow = `0 0 15px ${currentColor}`;
        }
        function clearCanvas() { drawHeart(); }

        const getPos = (e) => {
            const r = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - r.left, y: cy - r.top };
        };

        canvas.onmousedown = (e) => { isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
        canvas.onmousemove = (e) => {
            if(!isDrawing) return;
            const p = getPos(e);
            
            // Enhanced Stroke: Neon Glow
            ctx.shadowBlur = 10;
            ctx.shadowColor = currentColor;
            ctx.strokeStyle = currentColor; 
            ctx.lineWidth = brushSize; 
            ctx.lineCap = 'round'; 
            ctx.lineJoin = 'round';
            
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            
            // Subtle pulse by varying shadow blur slightly or adding a highlight layer
            ctx.shadowBlur = 4;
            ctx.lineWidth = brushSize * 0.4;
            ctx.strokeStyle = '#ffffff';
            ctx.stroke();
        };
        window.onmouseup = () => isDrawing = false;
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); canvas.onmousedown(e); }, {passive:false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); canvas.onmousemove(e); }, {passive:false});

        async function initCamera() {
            if(stream) return capture();
            try {
                // Visual feedback
                const zone = document.getElementById('selfie-zone');
                zone.classList.add('scale-95');
                setTimeout(() => zone.classList.remove('scale-95'), 200);

                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                const v = document.getElementById('video');
                v.srcObject = stream; v.classList.remove('hidden');
                document.getElementById('cam-p').style.display = 'none';
                document.getElementById('photo-v').classList.add('hidden');
            } catch(e) { alert('請允許相機存取權限'); }
        }

        function capture() {
            const v = document.getElementById('video'), c = document.createElement('canvas');
            const size = Math.min(v.videoWidth, v.videoHeight);
            
            // Flash effect
            const flash = document.createElement('div');
            flash.className = 'fixed inset-0 z-[3000] bg-white animate-pulse';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 200);

            c.width = 400; c.height = 400;
            const t = c.getContext('2d');
            t.scale(-1, 1);
            t.drawImage(v, (v.videoWidth-size)/2, (v.videoHeight-size)/2, size, size, -400, 0, 400, 400);
            selfieData = c.toDataURL('image/jpeg', 0.8);
            
            document.getElementById('photo-v').src = selfieData;
            document.getElementById('photo-v').classList.remove('hidden');
            document.getElementById('capture-status').classList.remove('scale-0');
            document.getElementById('capture-status').classList.add('scale-100');
            
            v.classList.add('hidden');
            stream.getTracks().forEach(t => t.stop()); stream = null;
        }

        async function launch() {
            const name = document.getElementById('parentName').value.trim();
            if(!name) return alert('請填寫名字再發射喔！');
            
            const btn = document.getElementById('launchBtn');
            btn.disabled = true; btn.innerText = '🎈 飛向夜空中...';

            const drawing = canvas.toDataURL('image/png');
            socket.emit('launchBalloon', { image: drawing, photo: selfieData, name, color: currentColor });

            const fb = document.getElementById('launch-anim');
            document.getElementById('fb-draw').src = drawing;
            fb.classList.remove('hidden');
            setTimeout(() => { fb.style.opacity = '1'; fb.style.transform = 'translateY(-300px) scale(0.5)'; }, 50);

            const card = document.createElement('canvas');
            card.width = 800; card.height = 1000;
            const cctx = card.getContext('2d');
            cctx.fillStyle='#fffbff'; cctx.fillRect(0,0,800,1000);
            const dImg = new Image(); dImg.src = drawing;
            await new Promise(r => dImg.onload = r);
            cctx.drawImage(dImg, 50, 100, 700, 700);
            if(selfieData) {
                const sImg = new Image(); sImg.src = selfieData;
                await new Promise(r => sImg.onload = r);
                cctx.save(); cctx.beginPath(); cctx.arc(400, 450, 200, 0, Math.PI*2); cctx.clip();
                cctx.drawImage(sImg, 200, 250, 400, 400); cctx.restore();
            }
            cctx.fillStyle='#ff758c'; cctx.textAlign='center'; cctx.font='bold 40px Noto Sans TC';
            cctx.fillText(name, 400, 900);
            
            document.getElementById('cardDisplay').src = card.toDataURL();
            setTimeout(() => {
                fb.classList.add('hidden');
                document.getElementById('card-modal').classList.remove('hidden');
            }, 1800);
        }

        window.onload = () => {
            initCanvas();
            // Initialize brush UI highlight
            const activeBtn = document.querySelector('.size-btn.active');
            if(activeBtn) activeBtn.style.boxShadow = `0 0 15px ${currentColor}`;
        };
        window.onresize = initCanvas;
    </script>
</body>
</html>
